# core listeners
listeners.tcp.default = 5672
management.tcp.port = 15672

# disable guest over non-loopback (definitions.json declares admin)
loopback_users.guest = false

# 3-node cluster via classic config peer discovery
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbit1
cluster_formation.classic_config.nodes.2 = rabbit@rabbit2
cluster_formation.classic_config.nodes.3 = rabbit@rabbit3

# keep stopped nodes in the cluster; pause minority on partitions
cluster_formation.node_cleanup.only_log_warning = true
cluster_partition_handling = pause_minority

# load exchange/queue/bindings on boot
management.load_definitions = /etc/rabbitmq/definitions.json

# default user fallback if definitions don't load (same as definitions.json)
default_user = admin
default_pass = admin
default_user_tags.administrator = true

# TLS knobs left here on purpose for the security writeup
# ssl_options.cacertfile = /etc/rabbitmq/certs/ca_cert.pem
