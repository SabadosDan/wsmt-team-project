global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    timeout connect 5s
    timeout client  3h
    timeout server  3h
    option  clitcpka
    option  srvtcpka

# AMQP load balancing across the rabbit nodes.
# long timeouts + tcp keepalives so idle AMQP connections aren't killed
# by HAProxy before the AMQP heartbeat fires
frontend amqp_in
    bind *:5672
    mode tcp
    default_backend amqp_nodes

backend amqp_nodes
    mode tcp
    balance roundrobin
    option tcp-check
    server rabbit1 rabbit1:5672 check inter 5s rise 2 fall 3
    server rabbit2 rabbit2:5672 check inter 5s rise 2 fall 3
    server rabbit3 rabbit3:5672 check inter 5s rise 2 fall 3

# Management UI on 15672. HTTP with sticky cookie so the UI session sticks
frontend mgmt_in
    bind *:15672
    mode http
    default_backend mgmt_nodes

backend mgmt_nodes
    mode http
    balance roundrobin
    cookie SRV insert indirect nocache
    option httpchk GET /api/health/checks/alarms
    http-check expect status 200
    server rabbit1 rabbit1:15672 check cookie r1 inter 5s
    server rabbit2 rabbit2:15672 check cookie r2 inter 5s
    server rabbit3 rabbit3:15672 check cookie r3 inter 5s

# HAProxy stats, handy for the demo
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
