name: wsmt

services:
  mongo:
    image: mongo:7.0.14
    container_name: mongo
    hostname: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks: [mom-net]
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbit1:
    image: rabbitmq:3.13.7-management
    container_name: rabbit1
    hostname: rabbit1
    restart: unless-stopped
    volumes:
      - rmq-data-1:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    configs:
      - source: erlang_cookie
        target: /var/lib/rabbitmq/.erlang.cookie
        mode: 0400
        uid: "999"
        gid: "999"
    networks: [mom-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  rabbit2:
    image: rabbitmq:3.13.7-management
    container_name: rabbit2
    hostname: rabbit2
    restart: unless-stopped
    depends_on:
      rabbit1:
        condition: service_healthy
    volumes:
      - rmq-data-2:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    configs:
      - source: erlang_cookie
        target: /var/lib/rabbitmq/.erlang.cookie
        mode: 0400
        uid: "999"
        gid: "999"
    networks: [mom-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  rabbit3:
    image: rabbitmq:3.13.7-management
    container_name: rabbit3
    hostname: rabbit3
    restart: unless-stopped
    depends_on:
      rabbit1:
        condition: service_healthy
    volumes:
      - rmq-data-3:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    configs:
      - source: erlang_cookie
        target: /var/lib/rabbitmq/.erlang.cookie
        mode: 0400
        uid: "999"
        gid: "999"
    networks: [mom-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  haproxy:
    image: haproxy:2.9.10
    container_name: haproxy
    hostname: haproxy
    restart: unless-stopped
    depends_on:
      rabbit1:
        condition: service_healthy
      rabbit2:
        condition: service_healthy
      rabbit3:
        condition: service_healthy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks: [mom-net]
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
      - "127.0.0.1:8404:8404"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      haproxy:
        condition: service_started
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/momproject
      SPRING_RABBITMQ_HOST: haproxy
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: "8080"
    networks: [mom-net]
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

configs:
  erlang_cookie:
    file: ./rabbitmq/erlang.cookie

volumes:
  mongo-data:
  rmq-data-1:
  rmq-data-2:
  rmq-data-3:

networks:
  mom-net:
    driver: bridge
