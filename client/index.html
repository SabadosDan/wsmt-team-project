<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSMT Item Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        main { padding: 2rem 1rem; max-width: 960px; margin: 0 auto; }
        .actions button { margin-right: 0.25rem; padding: 0.25rem 0.6rem; }
        .toast {
            position: fixed; right: 1rem; bottom: 1rem; padding: 0.6rem 1rem;
            background: var(--pico-card-background-color); border: 1px solid var(--pico-muted-border-color);
            border-radius: 0.4rem; display: none;
        }
        .toast.show { display: block; }
        small.api { opacity: 0.7; }
    </style>
</head>
<body>
<main>
    <hgroup>
        <h1>Item Management</h1>
        <p>WSMT team project. Distributed item manager backed by RabbitMQ and MongoDB.</p>
    </hgroup>

    <p><small class="api">API: <code id="api-url"></code></small></p>

    <article>
        <header><strong id="form-title">New item</strong></header>
        <form id="item-form">
            <input type="hidden" id="item-id">
            <label>Name
                <input type="text" id="name" required maxlength="120">
            </label>
            <label>Description
                <textarea id="description" rows="2"></textarea>
            </label>
            <label>Quantity
                <input type="number" id="quantity" min="0" value="1" required>
            </label>
            <div role="group">
                <button type="submit" id="submit-btn">Create</button>
                <button type="button" id="reset-btn" class="secondary">Reset</button>
            </div>
        </form>
    </article>

    <article>
        <header><strong>Items</strong> <button id="refresh-btn" class="secondary outline" style="float:right">Refresh</button></header>
        <table>
            <thead>
            <tr><th>Name</th><th>Description</th><th>Qty</th><th>Created</th><th></th></tr>
            </thead>
            <tbody id="items-body">
            <tr><td colspan="5"><em>Loading…</em></td></tr>
            </tbody>
        </table>
    </article>
</main>

<div class="toast" id="toast"></div>

<script>
    const API = (location.search.includes('api=')
        ? decodeURIComponent(location.search.split('api=')[1].split('&')[0])
        : 'http://localhost:8080/api/items');
    document.getElementById('api-url').textContent = API;

    const $ = (id) => document.getElementById(id);
    const toast = (msg) => {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    };

    async function loadItems() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const items = await res.json();
            renderItems(items);
        } catch (e) {
            $('items-body').innerHTML = `<tr><td colspan="5"><em>Failed to load: ${e.message}</em></td></tr>`;
        }
    }

    function renderItems(items) {
        const body = $('items-body');
        if (!items.length) {
            body.innerHTML = '<tr><td colspan="5"><em>No items yet.</em></td></tr>';
            return;
        }
        body.innerHTML = items.map(it => `
            <tr>
                <td>${escapeHtml(it.name || '')}</td>
                <td>${escapeHtml(it.description || '')}</td>
                <td>${it.quantity ?? ''}</td>
                <td><small>${formatDate(it.createdAt)}</small></td>
                <td class="actions">
                    <button data-edit="${it.id}" class="secondary outline">Edit</button>
                    <button data-del="${it.id}" class="contrast outline">Delete</button>
                </td>
            </tr>
        `).join('');

        body.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => editItem(b.dataset.edit));
        body.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteItem(b.dataset.del));
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
    }

    async function submitForm(e) {
        e.preventDefault();
        const id = $('item-id').value;
        const payload = {
            name: $('name').value.trim(),
            description: $('description').value.trim(),
            quantity: parseInt($('quantity').value, 10)
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API}/${id}` : API;
        try {
            const res = await fetch(url, {
                method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            resetForm();
            toast(id ? 'Updated' : 'Created');
            await loadItems();
        } catch (e) {
            toast('Save failed: ' + e.message);
        }
    }

    async function editItem(id) {
        try {
            const res = await fetch(`${API}/${id}`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const it = await res.json();
            $('item-id').value = it.id;
            $('name').value = it.name || '';
            $('description').value = it.description || '';
            $('quantity').value = it.quantity ?? 1;
            $('form-title').textContent = 'Edit item';
            $('submit-btn').textContent = 'Update';
            window.scrollTo({top: 0, behavior: 'smooth'});
        } catch (e) {
            toast('Load failed: ' + e.message);
        }
    }

    async function deleteItem(id) {
        if (!confirm('Delete this item?')) return;
        try {
            const res = await fetch(`${API}/${id}`, {method: 'DELETE'});
            if (!res.ok && res.status !== 204) throw new Error('HTTP ' + res.status);
            toast('Deleted');
            await loadItems();
        } catch (e) {
            toast('Delete failed: ' + e.message);
        }
    }

    function resetForm() {
        $('item-form').reset();
        $('item-id').value = '';
        $('form-title').textContent = 'New item';
        $('submit-btn').textContent = 'Create';
    }

    $('item-form').addEventListener('submit', submitForm);
    $('reset-btn').addEventListener('click', resetForm);
    $('refresh-btn').addEventListener('click', loadItems);

    loadItems();
</script>
</body>
</html>
