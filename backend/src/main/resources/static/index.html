<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body { background: #f8fafc; }
        main { padding: 2rem 1rem; max-width: 980px; margin: 0 auto; }

        .page-header {
            background: #1e40af;
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
        }
        .page-header h1 { margin: 0; font-size: 1.4rem; color: #fff; }
        .page-header p  { margin: 0.2rem 0 0; font-size: 0.85rem; color: #fff }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-grid .span2 { grid-column: span 2; }

        .actions button { margin-right: 0.25rem; padding: 0.2rem 0.55rem; font-size: 0.85rem; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-ok   { background: #dcfce7; color: #166534; }
        .badge-low  { background: #fef9c3; color: #854d0e; }
        .badge-zero { background: #fee2e2; color: #991b1b; }

        thead th { background: #f1f5f9; }
        table { font-size: 0.9rem; }

        small.api { opacity: 0.6; font-size: 0.78rem; }

        .toast {
            position: fixed; right: 1.2rem; bottom: 1.2rem;
            padding: 0.65rem 1.1rem;
            border-radius: 0.4rem;
            font-size: 0.9rem;
            color: #fff;
            display: none;
            z-index: 999;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
<main>
    <div class="page-header">
        <h1>Item Management</h1>
        <p>WSMT team project distributed item manager backed by RabbitMQ and MongoDB</p>
    </div>

    <article>
        <header><strong id="form-title">New item</strong></header>
        <form id="item-form">
            <input type="hidden" id="item-id">
            <div class="form-grid">
                <label>Name
                    <input type="text" id="name" required maxlength="120" placeholder="Item name">
                </label>
                <label>Quantity
                    <input type="number" id="quantity" min="0" value="1" required>
                </label>
                <label class="span2">Description
                    <input type="text" id="description" maxlength="240" placeholder="Optional description">
                </label>
            </div>
            <div role="group">
                <button type="submit" id="submit-btn">Create</button>
                <button type="button" id="reset-btn" class="secondary outline">Reset</button>
            </div>
        </form>
    </article>

    <article>
        <header>
            <strong>Items</strong>
            <button id="refresh-btn" class="secondary outline"
                    style="float:right; padding:0.2rem 0.65rem; font-size:0.85rem;">&#8635; Refresh</button>
        </header>
        <table>
            <thead>
            <tr><th>Name</th><th>Description</th><th>Quantity</th><th>Created</th><th></th></tr>
            </thead>
            <tbody id="items-body">
            <tr><td colspan="5"><em>Loading&hellip;</em></td></tr>
            </tbody>
        </table>
    </article>
</main>

<div class="toast" id="toast"></div>

<script>
    const API = (location.search.includes('api=')
        ? decodeURIComponent(location.search.split('api=')[1].split('&')[0])
        : 'http://localhost:8080/api/items');

    const $ = (id) => document.getElementById(id);

    const toast = (msg, ok = true) => {
        const t = $('toast');
        t.textContent = msg;
        t.style.background = ok ? '#166534' : '#991b1b';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    };

    function qtyBadge(qty) {
        if (qty === 0) return `<span class="badge badge-zero">0</span>`;
        if (qty < 5)  return `<span class="badge badge-low">${qty}</span>`;
        return `<span class="badge badge-ok">${qty}</span>`;
    }

    async function loadItems() {
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            renderItems(await res.json());
        } catch (e) {
            $('items-body').innerHTML =
                `<tr><td colspan="5"><em>Failed to load: ${e.message}</em></td></tr>`;
        }
    }

    function renderItems(items) {
        const body = $('items-body');
        if (!items.length) {
            body.innerHTML = '<tr><td colspan="5"><em>No items yet.</em></td></tr>';
            return;
        }
        body.innerHTML = items.map(it => `
            <tr>
                <td><strong>${escapeHtml(it.name || '')}</strong></td>
                <td>${escapeHtml(it.description || '')}</td>
                <td>${qtyBadge(it.quantity ?? 0)}</td>
                <td><small>${formatDate(it.createdAt)}</small></td>
                <td class="actions">
                    <button data-edit="${it.id}" class="secondary outline">Edit</button>
                    <button data-del="${it.id}"  class="contrast outline">Delete</button>
                </td>
            </tr>
        `).join('');

        body.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => editItem(b.dataset.edit));
        body.querySelectorAll('[data-del]').forEach(b => b.onclick  = () => deleteItem(b.dataset.del));
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g,
            c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
    }

    async function submitForm(e) {
        e.preventDefault();
        const id = $('item-id').value;
        const payload = {
            name:        $('name').value.trim(),
            description: $('description').value.trim(),
            quantity:    parseInt($('quantity').value, 10)
        };
        const method = id ? 'PUT' : 'POST';
        const url    = id ? `${API}/${id}` : API;
        try {
            const res = await fetch(url, {
                method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            resetForm();
            toast(id ? 'Item updated' : 'Item created');
            await loadItems();
        } catch (e) {
            toast('Save failed: ' + e.message, false);
        }
    }

    async function editItem(id) {
        try {
            const res = await fetch(`${API}/${id}`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const it = await res.json();
            $('item-id').value   = it.id;
            $('name').value      = it.name || '';
            $('description').value = it.description || '';
            $('quantity').value  = it.quantity ?? 1;
            $('form-title').textContent = 'Edit item';
            $('submit-btn').textContent = 'Update';
            window.scrollTo({top: 0, behavior: 'smooth'});
        } catch (e) {
            toast('Load failed: ' + e.message, false);
        }
    }

    async function deleteItem(id) {
        if (!confirm('Delete this item?')) return;
        try {
            const res = await fetch(`${API}/${id}`, {method: 'DELETE'});
            if (!res.ok && res.status !== 204) throw new Error('HTTP ' + res.status);
            toast('Item deleted');
            await loadItems();
        } catch (e) {
            toast('Delete failed: ' + e.message, false);
        }
    }

    function resetForm() {
        $('item-form').reset();
        $('item-id').value          = '';
        $('form-title').textContent = 'New item';
        $('submit-btn').textContent = 'Create';
    }

    $('item-form').addEventListener('submit', submitForm);
    $('reset-btn').addEventListener('click', resetForm);
    $('refresh-btn').addEventListener('click', loadItems);

    loadItems();
</script>
</body>
</html>
